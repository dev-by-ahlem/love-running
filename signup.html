<!DOCTYPE html>

 <link rel="icon" href="assets/favicon/favicon.ico">

<body>
    <!--header-->
    <header><a href="index.html"><h1 id="logo">Love Running</h1></a>
  <input type="checkbox" id="nav-toggle" name="nav-toggle">
  <label for="nav-toggle" class="nav-toggle-label"><i class="fa-solid fa-burger"></i></label>

         <li><a href="signup.html" >Sign Up</a></li> 
    </ul>
</nav>
</header>
    <!--Main Content-->
    <main>
         <section id="signup">
            <form id="signup-form" method="post" action="https://formdump.codeinstitute.net">
                <h2>LET'S GET YOU SIGNED UP!<i class="fa-solid fa-heart-pulse"></i></h2>
                <label for="first-name">First Name</label>
                <input type="text" name="first_name" id="first-name" class=""text-input required >
                <br>
                <label for="last-name">Last Name</label>
                <input type="text" name="last_name" id="last-name" class="text-input" required >
                <br>
                <label for="email-name">Email Address</label>
                <input type="email" name="email_address" id="email-address" class="text-input" required >
                <br>
                <div class="radio-buttons">
                    <div>
                        <label for="road">Road</label>
                        <input type="radio" name="running_preference" id="road" value="road" requered checked>
                    </div>
                    <div>
                        <label for="trail">Trail</label>
                        <input type="radio" name="running_preference" id="trail" value="trail" requered checked>
                    </div>
                    <div>
                        <label for="both">Both</label>
                        <input type="radio" name="running_preference" id="both" value="both" requered checked>
                    </div>
                    <button type="submit" id="join-button">Let's Run!</button>
                </div>
            </form>
            </section>
        </main>
    <!--footer-->
    <footer>

            <li><a href="https://www.instagram.com/" target="_blank" rel="noopener" aria-label="Visit our instagram page(opens in a new tab)"><i class="fa-brands fa-instagram"></i></a></li>
        </ul>
